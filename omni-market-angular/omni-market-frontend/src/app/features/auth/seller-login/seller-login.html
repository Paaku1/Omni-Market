<div class="login-wrapper min-vh-100 d-flex align-items-center justify-content-center bg-black position-relative overflow-hidden">
  
  <!-- Glowing Background Orbs -->
  <div class="glow-orb orb-cyan"></div>
  <div class="glow-orb orb-purple"></div>

  <div class="glass-card shadow-lg p-5 rounded-4 border border-secondary border-opacity-10 position-relative z-3">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <!-- Brand Header -->
      <div class="text-center mb-4">
        <div class="badge-seller-portal mb-2">SELLER PORTAL</div>
        <h1 class="text-cyan fw-bold tracking-wider mb-1 fs-3">OMNI-MARKET AUCTIONEER</h1>
        <p class="text-muted small">Access your inventory and real-time live listings</p>
      </div>

      <div class="row g-4 align-items-center">
        <!-- Credentials Form Column -->
        <div class="col-md-7 border-end border-secondary border-opacity-20 pe-md-4">
          
          <!-- Email Input -->
          <div class="form-group mb-3">
            <label class="form-label text-muted-light font-xs tracking-wider mb-2">SELLER EMAIL</label>
            <div class="input-group-premium rounded">
              <span class="input-icon">✉</span>
              <input type="email" formControlName="email" class="form-control-premium" placeholder="seller@domain.com">
            </div>
          </div>

          <!-- Password Input -->
          <div class="form-group mb-4">
            <label class="form-label text-muted-light font-xs tracking-wider mb-2">PORTAL ACCESS PASSWORD</label>
            <div class="input-group-premium rounded">
              <span class="input-icon">🔑</span>
              <input type="password" formControlName="password" class="form-control-premium" placeholder="••••••••">
            </div>
          </div>

          <!-- Error Alert -->
          <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-3 font-xs">
            ⚠️ {{ errorMessage }}
          </div>

          <!-- Submit Button -->
          <button class="btn btn-cyan w-100 py-3 fw-bold rounded-pill shadow tracking-wider transition-all" 
                  type="submit" 
                  [disabled]="loginForm.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
            {{ isLoading ? 'VERIFYING CREDENTIALS...' : 'LAUNCH INVENTORY' }}
          </button>

          <!-- Back to Bidder Link -->
          <div class="text-center mt-3 mb-0 small text-white-50">
            Bidder Account? <a routerLink="/login" class="text-cyan fw-bold hover-underline">Go to Bidder Arena</a>
          </div>
        </div>

        <!-- OAuth / Identity Column -->
        <div class="col-md-5 ps-md-4 text-center mt-4 mt-md-0">
          <p class="text-muted-light small mb-3 tracking-wider font-xs">SELLER FEDERATED LOGIN</p>
          
          <button type="button" class="btn btn-google-premium rounded-pill d-flex align-items-center justify-content-center w-100 py-3 shadow transition-all" (click)="onGoogleLogin()">
            <img src="Google-Icon.png" alt="Google" class="me-2" style="width: 22px; height: 22px;">
            <span class="fw-semibold text-white small">Google Account</span>
          </button>

          <p class="text-muted font-xs mt-3 leading-sm px-2">
            Secure authentication verified with your registered Seller credentials.
          </p>
        </div>
      </div>

    </form>
  </div>
</div>
